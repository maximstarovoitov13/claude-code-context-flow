<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e3b341"/>
    </marker>
  </defs>

  <!-- ===== main loop lane ===== -->

  <!-- plan-feature -->
  <rect x="30" y="60" width="170" height="64" rx="10" fill="#6e40c9"/>
  <text x="115" y="87" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="600">/plan-feature</text>
  <text x="115" y="108" text-anchor="middle" fill="#e2d6f8" font-size="11.5">research w/ sub-agents</text>
  <text x="115" y="48" text-anchor="middle" fill="#8b949e" font-size="11" font-style="italic">throw-away session</text>

  <!-- plan file artifact -->
  <rect x="250" y="60" width="190" height="64" rx="10" fill="none" stroke="#8b949e" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="345" y="87" text-anchor="middle" fill="#8b949e" font-size="14" font-weight="600">context/plans/*.md</text>
  <text x="345" y="108" text-anchor="middle" fill="#8b949e" font-size="11.5">the durable artifact</text>

  <line x1="200" y1="92" x2="245" y2="92" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- /clear divider -->
  <line x1="480" y1="45" x2="480" y2="140" stroke="#e3b341" stroke-width="2" stroke-dasharray="4 5"/>
  <text x="480" y="34" text-anchor="middle" fill="#e3b341" font-size="12.5" font-weight="600">/clear</text>

  <line x1="440" y1="92" x2="518" y2="92" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- execute -->
  <rect x="523" y="60" width="150" height="64" rx="10" fill="#1f6feb"/>
  <text x="598" y="87" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="600">/execute</text>
  <text x="598" y="108" text-anchor="middle" fill="#cfe1ff" font-size="11.5">plan = the context</text>
  <text x="598" y="48" text-anchor="middle" fill="#8b949e" font-size="11" font-style="italic">fresh session</text>

  <line x1="673" y1="92" x2="718" y2="92" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- commit -->
  <rect x="723" y="60" width="130" height="64" rx="10" fill="#238636"/>
  <text x="788" y="87" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="600">/commit</text>
  <text x="788" y="108" text-anchor="middle" fill="#c8e6c9" font-size="11.5">atomic, WHY-first</text>

  <!-- commit -> ship (down) -->
  <line x1="788" y1="124" x2="788" y2="176" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ship -->
  <rect x="723" y="181" width="130" height="64" rx="10" fill="#238636"/>
  <text x="788" y="208" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="600">/ship</text>
  <text x="788" y="229" text-anchor="middle" fill="#c8e6c9" font-size="11.5">gate → PR → merge</text>

  <!-- merged note -->
  <text x="788" y="266" text-anchor="middle" fill="#8b949e" font-size="11.5">main green, plan updated</text>

  <!-- loop back: ship -> execute (next phase), via /clear -->
  <path d="M 723 213 L 598 213 L 598 129" fill="none" stroke="#e3b341" stroke-width="2" marker-end="url(#arrow-accent)"/>
  <text x="655" y="205" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="600">/clear → next phase</text>
  <text x="655" y="231" text-anchor="middle" fill="#8b949e" font-size="11">the plan IS the handoff</text>

  <!-- ===== exception lane ===== -->
  <line x1="30" y1="300" x2="930" y2="300" stroke="#8b949e" stroke-width="1" stroke-dasharray="2 6" opacity="0.6"/>
  <text x="30" y="290" fill="#8b949e" font-size="12" font-weight="600" letter-spacing="1">INTERRUPTED MID-PHASE?</text>

  <rect x="30" y="318" width="140" height="56" rx="10" fill="#9e6a03"/>
  <text x="100" y="342" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">/handoff</text>
  <text x="100" y="361" text-anchor="middle" fill="#f5e0b8" font-size="11">decisions + dead ends</text>

  <line x1="170" y1="346" x2="235" y2="346" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="240" y="318" width="160" height="56" rx="10" fill="none" stroke="#8b949e" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="320" y="342" text-anchor="middle" fill="#8b949e" font-size="14" font-weight="600">HANDOFF.md</text>
  <text x="320" y="361" text-anchor="middle" fill="#8b949e" font-size="11">gitignored, transient</text>

  <line x1="400" y1="346" x2="465" y2="346" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="540" y="341" fill="#8b949e" font-size="12.5">next session: “Read HANDOFF.md and continue”</text>
  <text x="540" y="362" fill="#8b949e" font-size="11.5" font-style="italic">deleted by /ship once the work lands</text>
</svg>
