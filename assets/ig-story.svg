<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#101728"/>
      <stop offset="1" stop-color="#170f2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6e40c9"/>
      <stop offset="1" stop-color="#1f6feb"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- soft glow blobs -->
  <circle cx="950" cy="180" r="360" fill="#6e40c9" opacity="0.12"/>
  <circle cx="80" cy="1750" r="420" fill="#1f6feb" opacity="0.10"/>

  <!-- top label -->
  <rect x="80" y="150" width="420" height="64" rx="32" fill="none" stroke="#e3b341" stroke-width="2"/>
  <text x="290" y="192" text-anchor="middle" fill="#e3b341" font-size="28" font-weight="700" letter-spacing="4">NEW OPEN SOURCE</text>

  <!-- headline -->
  <text x="80" y="330" fill="#ffffff" font-size="72" font-weight="800">I built a plugin for</text>
  <text x="80" y="424" fill="#ffffff" font-size="72" font-weight="800">Claude Code</text>

  <!-- name -->
  <text x="80" y="540" fill="url(#accent)" font-size="96" font-weight="800" font-family="'SF Mono', Menlo, monospace">context-flow</text>

  <!-- subtitle -->
  <text x="80" y="630" fill="#9aa4b2" font-size="38">Your context window is a scratchpad,</text>
  <text x="80" y="684" fill="#9aa4b2" font-size="38">not a memory.</text>

  <!-- terminal window -->
  <rect x="80" y="770" width="920" height="640" rx="24" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <circle cx="130" cy="820" r="11" fill="#ff5f57"/>
  <circle cx="168" cy="820" r="11" fill="#febc2e"/>
  <circle cx="206" cy="820" r="11" fill="#28c840"/>

  <g font-family="'SF Mono', Menlo, monospace" font-size="34">
    <text x="130" y="920" fill="#8b949e">1.</text><text x="200" y="920" fill="#c9b3f5" font-weight="600">/plan-feature</text><text x="510" y="920" fill="#8b949e">research → plan file</text>
    <text x="130" y="1000" fill="#8b949e">2.</text><text x="200" y="1000" fill="#e3b341" font-weight="600">/clear</text><text x="510" y="1000" fill="#8b949e">fresh session</text>
    <text x="130" y="1080" fill="#8b949e">3.</text><text x="200" y="1080" fill="#79c0ff" font-weight="600">/execute</text><text x="510" y="1080" fill="#8b949e">plan = the context</text>
    <text x="130" y="1160" fill="#8b949e">4.</text><text x="200" y="1160" fill="#7ee787" font-weight="600">/commit → /ship</text><text x="565" y="1160" fill="#8b949e">gate, PR, merge</text>
    <text x="130" y="1240" fill="#8b949e">5.</text><text x="200" y="1240" fill="#ffa657" font-weight="600">/handoff</text><text x="510" y="1240" fill="#8b949e">if interrupted</text>
    <text x="130" y="1345" fill="#7ee787">✓ every session starts 100% signal</text>
  </g>

  <!-- works with any stack -->
  <text x="80" y="1510" fill="#9aa4b2" font-size="36">Works with any stack — Django, Next.js,</text>
  <text x="80" y="1562" fill="#9aa4b2" font-size="36">Go, Rails… one config file adapts it.</text>

  <!-- CTA -->
  <rect x="80" y="1650" width="920" height="110" rx="55" fill="url(#accent)"/>
  <text x="540" y="1706" text-anchor="middle" fill="#ffffff" font-size="38" font-weight="700" font-family="'SF Mono', Menlo, monospace">github.com/maximstarovoitov13</text>
  <text x="540" y="1748" text-anchor="middle" fill="#e6e0f8" font-size="30" font-family="'SF Mono', Menlo, monospace">/claude-code-context-flow</text>

  <text x="540" y="1840" text-anchor="middle" fill="#8b949e" font-size="30">⭐ free &amp; MIT — link in bio</text>
</svg>
